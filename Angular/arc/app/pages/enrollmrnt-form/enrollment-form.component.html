<h2>Student Enrollment Form</h2>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">

  <label>Name</label><br>

  <input
    type="text"
    name="studentName"
    [(ngModel)]="studentName"
    required
    minlength="3"
    #nameCtrl="ngModel">

  <br>

  <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">
    Name is required
  </span>

  <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">
    Name must be at least 3 characters
  </span>

  <br><br>

  <label>Email</label><br>

  <input
    type="email"
    name="studentEmail"
    [(ngModel)]="studentEmail"
    required
    email
    #emailCtrl="ngModel">

  <br>

  <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">
    Email is required
  </span>

  <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">
    Invalid Email
  </span>

  <br><br>

  <label>Course ID</label><br>

  <input
    type="number"
    name="courseId"
    [(ngModel)]="courseId"
    required
    #courseCtrl="ngModel">

  <br>

  <span *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">
    Course ID is required
  </span>

  <br><br>

  <label>Semester</label>

  <select
    name="preferredSemester"
    [(ngModel)]="preferredSemester">

    <option>Odd</option>
    <option>Even</option>

  </select>

  <br><br>

  <label>

    <input
      type="checkbox"
      name="agreeToTerms"
      [(ngModel)]="agreeToTerms"
      required>

    Agree to Terms

  </label>

  <br><br>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">

    Submit

  </button>

  <button
    type="button"
    (click)="enrollForm.resetForm()">

    Reset

  </button>

</form>

<div *ngIf="submitted">

  <h3>Enrollment request submitted successfully!</h3>

</div>
