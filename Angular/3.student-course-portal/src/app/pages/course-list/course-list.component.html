<h2>Course List</h2>

<p *ngIf="isLoading">
  Loading courses...
</p>

<div *ngIf="!isLoading">

  <app-course-card
    *ngFor="let course of courses; trackBy: trackByCourseId"
    [course]="course"
    (enrollRequested)="onEnroll($event)">
  </app-course-card>

</div>

<p *ngIf="selectedCourseId">
  Selected Course ID:
  {{ selectedCourseId }}
</p>

<ng-template #noCourses>
  <p>No Courses Available</p>
</ng-template>
